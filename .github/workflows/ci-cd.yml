# FILE: .github/workflows/ci-cd.yml
name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
    
    - name: Install API dependencies
      run: |
        cd shop/apps/api
        npm ci
    
    - name: Run API tests
      run: |
        cd shop/apps/api
        npm test
      env:
        NODE_ENV: test
        MONGODB_URI: mongodb://localhost:27017/shop-test
        JWT_SECRET: test-secret-min-32-chars-long
        JWT_REFRESH_SECRET: test-refresh-secret-min-32-chars
        REDIS_HOST: localhost
        REDIS_PORT: 6379
        CLOUDINARY_CLOUD_NAME: test
        CLOUDINARY_API_KEY: test
        CLOUDINARY_API_SECRET: test
    
    - name: Install Web dependencies
      run: |
        cd shop/apps/web
        npm ci
    
    - name: Build Web
      run: |
        cd shop/apps/web
        npm run build
      env:
        VITE_API_URL: https://api.vtechkitchen.com/api

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Build and push API
      uses: docker/build-push-action@v4
      with:
        context: ./shop
        file: ./shop/configs/Dockerfile.api
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/shop-api:latest

    - name: Build and push Web
      uses: docker/build-push-action@v4
      with:
        context: ./shop
        file: ./shop/configs/Dockerfile.web
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/shop-web:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Deploy to production
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.PRODUCTION_HOST }}
        username: ${{ secrets.PRODUCTION_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          cd /var/www/shop
          docker-compose -f docker-compose.prod.yml pull
          docker-compose -f docker-compose.prod.yml up -d
          docker system prune -f