# Netlify Configuration - SPA Routing + SEO Files

# Enable post-processing
[build.processing]
  skip_processing = false
[build.processing.html]
  pretty_urls = true
[build.processing.images]
  compress = true

# Proxy sitemap.xml to API (SEO critical)
[[redirects]]
  from = "/sitemap.xml"
  to = "https://api.vtechkitchen.com/sitemap.xml"
  status = 200
  force = true

# Proxy robots.txt to API (SEO critical)
[[redirects]]
  from = "/robots.txt"
  to = "https://api.vtechkitchen.com/robots.txt"
  status = 200
  force = true

# SPA fallback - must be last
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
