  <body>
    <div id="root">
      <!-- Initial content for SEO - React will replace this -->
      <noscript>
        <div style="padding: 40px; text-align: center; font-family: system-ui, sans-serif;">

      <!-- Loading state shown before React hydrates -->
      <div id="initial-loader" style="display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: system-ui, sans-serif;">
        <div style="text-align: center;">
          <h1 style="font-size: 24px; color: #333;">V-Tech Kitchen</h1>

        </div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Remove initial loader once React mounts
      window.addEventListener('load', function() {
        var loader = document.getElementById('initial-loader');
        if (loader) setTimeout(function() { loader.style.display = 'none'; }, 100);
      });
    </script>
  </body>
